services:
  mailapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: mailapi:latest
    container_name: mailapi
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
